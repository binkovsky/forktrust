version: 2

project_name: forktrust

before:
  hooks:
    - go mod tidy

builds:
  - id: forktrust
    main: ./cmd/forktrust
    binary: forktrust
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: forktrust
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - 'Merge pull request'
      - 'Merge branch'

# Homebrew tap shipping is set up in Phase 2 after the first release lands.
# Will use the current goreleaser homebrew_casks / formula syntax then.

release:
  github:
    owner: binkovsky
    name: forktrust
  draft: false
  prerelease: auto
